name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install HPP dependencies
        run: python -m pip install --upgrade --force-reinstall -r hpp/requirements.txt

      - name: Show HPP environment
        run: |
          git submodule status
          python - <<'PY'
          import bs4
          print(f"beautifulsoup4=={bs4.__version__}")
          PY

      - name: Generate site
        run: python hpp/hpp.py --in-dir theme/site --in-dir site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload sitegen
        uses: actions/upload-pages-artifact@v3
        with:
          path: sitegen

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
